---
- name: Install software-properties-common
  ansible.builtin.apt:
    name: software-properties-common
    state: present
    update_cache: false

- name: Add deadsnakes PPA for Python 3.12
  ansible.builtin.apt_repository:
    repo: ppa:deadsnakes/ppa
    state: present
    update_cache: true

- name: Install system packages
  ansible.builtin.apt:
    name:
      - python3.12
      - python3.12-venv
      - python3.12-dev
      - python3-pip
      - git
      - curl
      - build-essential
      - libpq-dev
    state: present
    update_cache: false
