version: 1
name: python-app-01
vcs: github
rollback:
  strategy: manual

stages:
  - id: lint
    kind: lint
    needs: []
    timeout_minutes: 10
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linting tools
        run: pip install flake8==7.1.1
      - name: Lint
        run: flake8 app/ --max-line-length=120 --exclude=app/migrations

  - id: test
    kind: test
    needs: [lint]
    timeout_minutes: 10
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: pytest tests/ -v
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db

  - id: provision
    kind: provision
    needs: [test]
    timeout_minutes: 30
    outputs:
      instance_ip: ${{ steps.tf_output.outputs.instance_ip }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
    steps:
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Terraform Init
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: infra
      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve
        working-directory: infra
      - name: Get Outputs
        id: tf_output
        run: |
          echo "instance_ip=$(terraform output -raw instance_ip)" >> "$GITHUB_OUTPUT"
        working-directory: infra

  - id: configure
    kind: configure
    needs: [provision]
    timeout_minutes: 30
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ansible
        run: pip install ansible-core
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Read infra outputs
        id: infra
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate" \
            -backend-config="region=us-east-1"
          echo "db_host=$(terraform output -raw db_host)" >> "$GITHUB_OUTPUT"
        working-directory: infra
      - name: Write SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
      - name: Scan host key
        run: |
          ssh-keyscan -H "${{ needs.provision.outputs.instance_ip }}" >> ~/.ssh/known_hosts
      - name: Generate inventory
        run: |
          cat > ansible/inventory.ini <<EOF
          [app]
          ${{ needs.provision.outputs.instance_ip }} ansible_user=${{ secrets.SSH_USER }} ansible_ssh_private_key_file=~/.ssh/deploy_key
          EOF
      - name: Run playbook
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/site.yml \
            -e "db_password=$DB_PASSWORD" \
            -e "db_host=$DB_HOST"
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ steps.infra.outputs.db_host }}
          ANSIBLE_HOST_KEY_CHECKING: "False"

  - id: verify
    kind: verify
    needs: [provision, configure]
    timeout_minutes: 10
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
    steps:
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Get instance IP
        id: get_ip
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate" \
            -backend-config="region=us-east-1"
          echo "instance_ip=$(terraform output -raw instance_ip)" >> "$GITHUB_OUTPUT"
        working-directory: infra
      - name: Health check
        run: |
          curl --fail --retry 10 --retry-delay 15 --retry-all-errors \
            http://${{ steps.get_ip.outputs.instance_ip }}:8000/health
