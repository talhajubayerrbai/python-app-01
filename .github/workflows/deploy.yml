name: deploy
'on':
  workflow_dispatch: {}
jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install linting tools
      run: pip install flake8==7.1.1
    - name: Lint
      run: flake8 app/ --max-line-length=120 --exclude=app/migrations
  test:
    runs-on: ubuntu-latest
    needs:
    - lint
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: pip install -r requirements.txt -r requirements-dev.txt
    - name: Run tests
      run: pytest tests/ -v
      env:
        DATABASE_URL: sqlite+aiosqlite:///./test.db
  provision:
    runs-on: ubuntu-latest
    needs:
    - test
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
    timeout-minutes: 30
    outputs:
      instance_ip: ${{ steps.tf_output.outputs.instance_ip }}
    steps:
    - uses: actions/checkout@v4
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false
    - name: Terraform Init
      run: "terraform init -input=false -reconfigure \\\n  -backend-config=\"bucket=${{\
        \ secrets.TF_STATE_BUCKET }}\" \\\n  -backend-config=\"key=${{ secrets.PROJECT_NAME\
        \ }}/terraform.tfstate\" \\\n  -backend-config=\"region=us-east-1\"\n"
      working-directory: infra
    - name: Terraform Apply
      run: terraform apply -input=false -auto-approve
      working-directory: infra
    - id: tf_output
      name: Get Outputs
      run: 'echo "instance_ip=$(terraform output -raw instance_ip)" >> "$GITHUB_OUTPUT"

        '
      working-directory: infra
  configure:
    runs-on: ubuntu-latest
    needs:
    - provision
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Ansible
      run: pip install ansible-core
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false
    - id: infra
      name: Read infra outputs
      run: "terraform init -input=false -reconfigure \\\n  -backend-config=\"bucket=${{\
        \ secrets.TF_STATE_BUCKET }}\" \\\n  -backend-config=\"key=${{ secrets.PROJECT_NAME\
        \ }}/terraform.tfstate\" \\\n  -backend-config=\"region=us-east-1\"\necho\
        \ \"db_host=$(terraform output -raw db_host)\" >> \"$GITHUB_OUTPUT\"\n"
      working-directory: infra
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: us-east-1
        TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
        TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
    - name: Write SSH key
      run: 'mkdir -p ~/.ssh

        printf ''%s\n'' "$SSH_KEY" > ~/.ssh/deploy_key

        chmod 600 ~/.ssh/deploy_key

        '
      env:
        SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
    - name: Scan host key
      run: 'ssh-keyscan -H "${{ needs.provision.outputs.instance_ip }}" >> ~/.ssh/known_hosts

        '
    - name: Generate inventory
      run: 'cat > ansible/inventory.ini <<EOF

        [app]

        ${{ needs.provision.outputs.instance_ip }} ansible_user=${{ secrets.SSH_USER
        }} ansible_ssh_private_key_file=~/.ssh/deploy_key

        EOF

        '
    - name: Run playbook
      run: "ansible-playbook -i ansible/inventory.ini ansible/site.yml \\\n  -e \"\
        db_password=$DB_PASSWORD\" \\\n  -e \"db_host=$DB_HOST\"\n"
      env:
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_HOST: ${{ steps.infra.outputs.db_host }}
        ANSIBLE_HOST_KEY_CHECKING: 'False'
  verify:
    runs-on: ubuntu-latest
    needs:
    - provision
    - configure
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false
    - id: get_alb
      name: Get ALB DNS name
      run: "terraform init -input=false -reconfigure \\\n  -backend-config=\"bucket=${{\
        \ secrets.TF_STATE_BUCKET }}\" \\\n  -backend-config=\"key=${{ secrets.PROJECT_NAME\
        \ }}/terraform.tfstate\" \\\n  -backend-config=\"region=us-east-1\"\necho\
        \ \"alb_dns=$(terraform output -raw alb_dns_name)\" >> \"$GITHUB_OUTPUT\"\n"
      working-directory: infra
      env:
        TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
        TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
    - name: Health check via ALB
      run: "curl --fail --retry 15 --retry-delay 20 --retry-all-errors \\\n  http://${{\
        \ steps.get_alb.outputs.alb_dns }}/health\n"
